server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    default_type application/javascript;
    charset utf-8;

    # CORS for cross-origin script embeds
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Stable latest URL — short cache so deploys propagate quickly
    location = /widget.js {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        try_files /widget.cdn.js =404;
    }

    # Version-pinned URL — immutable long cache
    # e.g. /widget@1.1.0.js
    location ~ ^/widget@[0-9]+\.[0-9]+\.[0-9]+\.js$ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        try_files $uri =404;
    }

    # Direct access to build artifacts (iife / es / umd)
    location / {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ =404;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
